# TrajectoryRL Validator — Production Compose
#
# Runs the validator from GHCR with Watchtower auto-update.
#
# Setup:
#   1. Create .env.validator in repo root (see below)
#   2. docker compose --env-file .env.validator -f docker/docker-compose.validator.yml up -d
#   3. docker compose -f docker/docker-compose.validator.yml logs -f validator
#
# Required .env:
#   WALLET_NAME=sn11-owner
#   WALLET_HOTKEY=default
#   NETUID=11
#   NETWORK=finney

services:
  # --------------------------------------------------------------------------
  # Validator: sets on-chain weights (auto-updated by Watchtower)
  # --------------------------------------------------------------------------
  validator:
    image: ghcr.io/trajectoryrl/trajectoryrl:latest
    container_name: trajectoryrl_validator
    restart: unless-stopped
    environment:
      - WALLET_NAME=${WALLET_NAME:-validator}
      - WALLET_HOTKEY=${WALLET_HOTKEY:-default}
      - NETUID=${NETUID:-11}
      - NETWORK=${NETWORK:-finney}
      - EVAL_INTERVAL_BLOCKS=${EVAL_INTERVAL_BLOCKS:-1200}
      - WEIGHT_INTERVAL_BLOCKS=${WEIGHT_INTERVAL_BLOCKS:-360}
      - EMA_ALPHA=${EMA_ALPHA:-0.3}
      - INACTIVITY_BLOCKS=${INACTIVITY_BLOCKS:-14400}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ~/.bittensor/wallets:/root/.bittensor/wallets:ro
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --------------------------------------------------------------------------
  # Watchtower: polls GHCR every 5 min, auto-pulls new images, restarts
  # --------------------------------------------------------------------------
  watchtower:
    image: containrrr/watchtower:latest
    container_name: trajectoryrl_watchtower
    restart: unless-stopped
    environment:
      - DOCKER_API_VERSION=1.44
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
