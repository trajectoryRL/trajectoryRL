# TrajectoryRL Validator — Production Compose (all-in-one)
#
# Single image contains everything: validator + mock-tools + OpenClaw gateway.
# Watchtower auto-updates the image from GHCR.
#
# Setup:
#   1. Create .env.validator in repo root (see docker/README.md)
#   2. docker compose --env-file .env.validator -f docker/docker-compose.validator.yml up -d
#   3. docker compose -f docker/docker-compose.validator.yml logs -f validator
#
# Required .env.validator:
#   WALLET_NAME=sn11-owner
#   WALLET_HOTKEY=default
#   NETUID=11
#   NETWORK=finney
#   CLAWBENCH_LLM_API_KEY=...
#   CLAWBENCH_LLM_BASE_URL=https://open.bigmodel.cn/api/paas/v4
#   CLAWBENCH_DEFAULT_MODEL=zhipu/glm-5

services:
  validator:
    image: ghcr.io/trajectoryrl/trajectoryrl:latest
    container_name: trajectoryrl_validator
    network_mode: host
    restart: unless-stopped
    env_file:
      - ../.env.validator
    volumes:
      - ~/.bittensor/wallets:/root/.bittensor/wallets:ro
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: trajectoryrl_watchtower
    restart: unless-stopped
    environment:
      - DOCKER_API_VERSION=1.44
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
