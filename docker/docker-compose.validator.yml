# TrajectoryRL Validator — Production Compose (self-contained)
#
# Runs the validator from GHCR with all required ClawBench services.
# Watchtower auto-updates the validator image.
#
# Setup:
#   1. Create .env.validator in repo root (see below)
#   2. docker compose --env-file .env.validator -f docker/docker-compose.validator.yml up -d
#   3. docker compose -f docker/docker-compose.validator.yml logs -f validator
#
# Required .env.validator:
#   WALLET_NAME=sn11-owner
#   WALLET_HOTKEY=default
#   NETUID=11
#   NETWORK=finney
#   ANTHROPIC_API_KEY=sk-ant-...

services:
  # ==========================================================================
  # Init Container
  # Copies AGENTS.md variant and workspace files. Runs once, then exits.
  # ==========================================================================
  init:
    build:
      context: ../clawbench
      dockerfile: Dockerfile.init
    volumes:
      - ../clawbench/fixtures:/fixtures:ro
      - ../clawbench/scenarios:/scenarios:ro
      - workspace:/workspace
      - ../clawbench/config:/config
    environment:
      - SCENARIO=${SCENARIO:-client_escalation}
      - VARIANT=${VARIANT:-optimized}
      - CLAWBENCH_MODEL=${CLAWBENCH_MODEL:-anthropic/claude-sonnet-4-5-20250929}

  # Fix workspace permissions after init (OpenClaw runs as node uid=1000)
  init-perms:
    image: busybox
    command: sh -c "chmod -R 777 /workspace"
    volumes:
      - workspace:/workspace
    depends_on:
      init:
        condition: service_completed_successfully

  # ==========================================================================
  # Mock Tools Server
  # Serves deterministic tool responses from fixtures (port 3001).
  # ==========================================================================
  mock-tools:
    build:
      context: ../clawbench
      dockerfile: Dockerfile.mock-tools
    ports:
      - "3001:3001"
    volumes:
      - ../clawbench/fixtures:/fixtures:ro
      - ../clawbench/logs:/logs
    environment:
      - FIXTURES_PATH=/fixtures
      - SCENARIO=${SCENARIO:-client_escalation}
      - LOG_PATH=/logs
    depends_on:
      init-perms:
        condition: service_completed_successfully
    networks:
      - sandbox-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==========================================================================
  # OpenClaw Gateway (ClawBench Edition)
  # Built from openclaw/ with clawbench-tools plugin (port 18790).
  # ==========================================================================
  openclaw-gateway:
    build:
      context: ../openclaw
      dockerfile: Dockerfile.clawbench
    ports:
      - "${OPENCLAW_PORT:-18790}:18789"
    volumes:
      - workspace:/workspace
      - ../clawbench/config/openclaw.json:/home/node/.openclaw/openclaw.json:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-sandbox-token-12345}
      - CLAWBENCH_MODEL=${CLAWBENCH_MODEL:-anthropic/claude-sonnet-4-5-20250929}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      init-perms:
        condition: service_completed_successfully
      mock-tools:
        condition: service_healthy
    networks:
      - sandbox-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================================================
  # Validator
  # Reads on-chain commitments, fetches packs, evaluates via ClawBench.
  # Uses host networking to reach mock-tools (3001) and OpenClaw (18790).
  # Auto-updated by Watchtower from GHCR.
  # ==========================================================================
  validator:
    image: ghcr.io/trajectoryrl/trajectoryrl:latest
    container_name: trajectoryrl_validator
    network_mode: host
    restart: unless-stopped
    environment:
      - WALLET_NAME=${WALLET_NAME:-validator}
      - WALLET_HOTKEY=${WALLET_HOTKEY:-default}
      - NETUID=${NETUID:-11}
      - NETWORK=${NETWORK:-finney}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ~/.bittensor/wallets:/root/.bittensor/wallets:ro
      - workspace:/app/clawbench/workspace
    depends_on:
      openclaw-gateway:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --------------------------------------------------------------------------
  # Watchtower: polls GHCR every 5 min, auto-pulls new images, restarts
  # --------------------------------------------------------------------------
  watchtower:
    image: containrrr/watchtower:latest
    container_name: trajectoryrl_watchtower
    restart: unless-stopped
    environment:
      - DOCKER_API_VERSION=1.44
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  workspace:

networks:
  sandbox-net:
    driver: bridge
